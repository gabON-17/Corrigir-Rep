<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro</title>

    <style>
      /* FUNDO */
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #202020;
      }

      /* OVERLAY */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.85);

        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* CAIXA */
      .popup {
        background: #2c2c2c;
        padding: 30px;
        border-radius: 12px;
        width: 280px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      /* TÍTULO */
      .popup h1 {
        margin-bottom: 20px;
        color: #ffffff;
      }

      /* INPUTS */
      .popup input {
        width: 91%;
        padding: 10px;
        margin-bottom: 12px;
        border: none;
        border-radius: 6px;
        outline: none;
      }

      /* BOTÃO */
      .popup button {
        width: 100%;
        padding: 10px;
        background: #3bb1ff;
        border: none;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      .popup button:hover {
        background: #448aff;
      }

      /* MENSAGEM */
      #msg {
        margin-top: 10px;
        color: #00e676;
      }
    </style>
  </head>

  <body>
    <div class="overlay">
      <div class="popup" onkeyup="eventEnter(event)">
        <h1>Cadastro</h1>

        <input type="text" id="usuario" placeholder="Usuário" />
        <input type="password" id="senha" placeholder="Senha" />

        <button onclick="cadastrar()">Cadastrar</button>

        <h3 id="msg"></h3>
      </div>
    </div>

    <script>
      function cadastrar() {
        let user = document.getElementById("usuario").value.trim();
        let pass = document.getElementById("senha").value.trim();

        if (user === "" || pass === "") {
          document.getElementById("msg").style.color = "#ff5252";
          document.getElementById("msg").innerText =
            "Preencha todos os campos!";
          return;
        }

        localStorage.setItem("usuario", user);
        localStorage.setItem("senha", pass);

        document.getElementById("msg").style.color = "#00e676";
        document.getElementById("msg").innerText =
          "Cadastro realizado com sucesso!";

        // limpa campos
        document.getElementById("usuario").value = "";
        document.getElementById("senha").value = "";
      }

      function eventEnter(e) {
        if (e.key == "Enter") {
          cadastrar();
        }
      }
    </script>
  </body>
</html>
